<!DOCTYPE html>
<html lang="pt-br" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compare Dental Pro</title>

    <!-- Bibliotecas Base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="https://unpkg.com/clsx@latest/dist/clsx.min.js"></script>
    <script src="https://unpkg.com/tailwind-merge@latest/dist/bundle.min.js"></script>

    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 900: '#134e4a' },
                        dark: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* Esconde a barra de scroll horizontal mas permite rolar (para categorias no mobile) */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .store-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid;
            text-transform: uppercase;
            white-space: nowrap;
            display: inline-block;
            letter-spacing: 0.05em;
        }

        .store-speed {
            background: #e0f2f1;
            color: #00695c;
            border-color: #b2dfdb;
        }

        .store-cremer {
            background: #fff3e0;
            color: #e65100;
            border-color: #ffe0b2;
        }

        .store-surya {
            background: #fce4ec;
            color: #880e4f;
            border-color: #f8bbd0;
        }

        .store-passaro {
            background: #f3e5f5;
            color: #4a148c;
            border-color: #e1bee7;
        }

        .store-adental {
            background: #e8f5e9;
            color: #1b5e20;
            border-color: #c8e6c9;
        }

        .store-generic {
            background: #f1f5f9;
            color: #475569;
            border-color: #cbd5e1;
        }
    </style>
</head>

<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;
        const cn = (...inputs) => inputs.filter(Boolean).join(" ");
        const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
            componentDidCatch(error, errorInfo) { this.setState({ hasError: true, error, errorInfo }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-red-50 min-h-screen flex flex-col items-center justify-center">
                            <div className="max-w-2xl w-full bg-white p-8 rounded-3xl shadow-2xl border-2 border-red-200">
                                <h1 className="text-2xl font-black text-red-600 mb-2">Oops! O site travou.</h1>
                                <p className="text-slate-600 mb-6">Aconteceu um erro. Por favor, avise o desenvolvedor:</p>
                                <div className="bg-slate-900 text-green-400 p-4 rounded-xl overflow-x-auto text-sm font-mono whitespace-pre-wrap">
                                    {this.state.error && this.state.error.toString()}
                                    <br /><br />
                                    <span className="text-slate-400">{this.state.errorInfo && this.state.errorInfo.componentStack}</span>
                                </div>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const normalizeText = (text) => {
            if (!text) return "";
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.setAttribute('width', size);
                    i.setAttribute('height', size);
                    if (className) i.setAttribute('class', className);
                    ref.current.appendChild(i);
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        const Badge = ({ children, store }) => {
            let cls = "store-generic";
            if (store) {
                const s = String(store).toLowerCase();
                if (s.includes('speed')) cls = "store-speed";
                else if (s.includes('cremer')) cls = "store-cremer";
                else if (s.includes('surya')) cls = "store-surya";
                else if (s.includes('passaro')) cls = "store-passaro";
                else if (s.includes('dental') || s.includes('adental')) cls = "store-adental";
            }
            return <span className={`store-badge ${cls}`}>{children || "LOJA"}</span>;
        };

        const Button = ({ children, variant = 'primary', className, ...props }) => {
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-lg shadow-brand-500/20",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-emerald-500/20"
            };
            return <button className={cn("inline-flex items-center justify-center rounded-xl px-4 py-2.5 font-bold transition-all active:scale-95 disabled:opacity-50", variants[variant], className)} {...props}>{children}</button>;
        };

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [loading, setLoading] = useState(true);
            const [connected, setConnected] = useState(false);
            const [activeTab, setActiveTab] = useState('market');
            const [categoryFilter, setCategoryFilter] = useState('Todas');
            const [storeFilter, setStoreFilter] = useState('Todas');
            const [sortOption, setSortOption] = useState('price_asc');
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [toasts, setToasts] = useState([]);

            useEffect(() => { fetchProdutos(); }, []);

            const fetchProdutos = async () => {
                setLoading(true);
                try {
                    const res = await fetch('https://WesleyRPN.pythonanywhere.com/produtos');
                    if (!res.ok) throw new Error("Erro de conexão com o servidor.");
                    const data = await res.json();

                    if (Array.isArray(data)) {
                        const formattedData = data.map((p, i) => ({
                            ...p,
                            uuid: `prod-${p.id || i}-${i}`,
                            searchString: normalizeText(`${p.name || ''} ${p.category || ''} ${p.subCategory || ''} ${p.brand || ''}`)
                        }));
                        setProducts(formattedData);
                        setConnected(true);
                    }
                } catch (e) {
                    console.warn("API offline", e.message);
                    setConnected(false);
                    addToast("API Offline", "error");
                } finally { setLoading(false); }
            };

            const addToast = (msg, type = 'success') => {
                const id = Math.random();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            const addToCart = (item) => {
                setCart(prev => [...prev, { ...item, qty: 1, cartId: `${Date.now()}-${Math.random()}` }]);
                addToast("Adicionado ao carrinho!");
            };

            const removeFromCart = (cartId) => {
                setCart(prev => prev.filter(item => item.cartId !== cartId));
            };

            const emptyCart = () => {
                if (confirm("Deseja esvaziar o carrinho?")) {
                    setCart([]);
                    addToast("Carrinho limpo.", "info");
                }
            };

            return (
                <AppContext.Provider value={{
                    products, cart, setCart,
                    loading, connected, activeTab, setActiveTab, categoryFilter, setCategoryFilter,
                    storeFilter, setStoreFilter, sortOption, setSortOption, searchTerm, setSearchTerm,
                    selectedProduct, setSelectedProduct, toasts, addToast, addToCart, removeFromCart, emptyCart
                }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const VisualAutocomplete = ({ onSelect, placeholder }) => {
            const { products } = useContext(AppContext);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const [isOpen, setIsOpen] = useState(false);

            const fuse = useMemo(() => new Fuse(products, {
                keys: ['searchString', 'name'],
                threshold: 0.5,
                ignoreLocation: true,
                minMatchCharLength: 3
            }), [products]);

            useEffect(() => {
                if (query.length > 2) {
                    const normalizedQuery = normalizeText(query);
                    setResults(fuse.search(normalizedQuery).map(r => r.item).slice(0, 5));
                    setIsOpen(true);
                } else { setResults([]); setIsOpen(false); }
            }, [query, fuse]);

            return (
                <div className="relative w-full">
                    <div className="relative">
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" /></div>
                        <input type="text" className="w-full pl-12 pr-4 py-3 rounded-xl bg-white border border-slate-200 focus:ring-2 focus:ring-brand-500 outline-none shadow-sm text-sm" placeholder={placeholder} value={query} onChange={(e) => setQuery(e.target.value)} onBlur={() => setTimeout(() => setIsOpen(false), 200)} />
                    </div>
                    {isOpen && results.length > 0 && (<div className="absolute top-full left-0 w-full mt-2 bg-white rounded-xl shadow-2xl border border-slate-100 overflow-hidden animate-slide-up z-[60]">{results.map((item, idx) => (<div key={idx} onClick={() => { onSelect(item); setQuery(""); setIsOpen(false); }} className="flex items-center gap-3 p-3 hover:bg-slate-50 cursor-pointer border-b last:border-0"><div className="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center shrink-0"><img src={item.img} className="w-full h-full object-contain p-1" onError={(e) => e.target.src = "https://via.placeholder.com/50"} /></div><div className="flex-1 min-w-0"><p className="text-xs font-bold text-slate-800 truncate">{item.name}</p><p className="text-[10px] text-slate-500">{item.store}</p></div><span className="font-bold text-brand-600 text-sm">{formatMoney(item.price)}</span></div>))}</div>)}
                </div>
            );
        };

        const ProductDetailModal = () => {
            const { selectedProduct, setSelectedProduct, products, addToCart } = useContext(AppContext);
            if (!selectedProduct) return null;
            const comparisons = products.filter(p => p.name === selectedProduct.name && p.store !== selectedProduct.store).sort((a, b) => a.price - b.price);
            return (
                <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in" onClick={() => setSelectedProduct(null)}>
                    <div className="bg-white w-full md:w-auto md:min-w-[600px] md:max-w-4xl max-h-[90vh] rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden animate-slide-up md:animate-none" onClick={e => e.stopPropagation()}>
                        <div className="md:w-1/2 bg-slate-50 p-6 flex items-center justify-center relative border-b md:border-b-0 md:border-r border-slate-100">
                            <Badge store={selectedProduct.store} />
                            <img src={selectedProduct.img} className="max-h-[200px] md:max-h-[300px] object-contain mix-blend-multiply" onError={(e) => e.target.src = "https://via.placeholder.com/300"} />
                        </div>
                        <div className="md:w-1/2 p-6 md:p-8 overflow-y-auto custom-scroll flex flex-col max-h-[50vh] md:max-h-[80vh]">
                            <div className="flex justify-between mb-2">
                                <span className="text-[10px] font-black uppercase text-brand-600 tracking-widest">{selectedProduct.category}</span>
                                <button onClick={() => setSelectedProduct(null)} className="p-1 bg-slate-100 rounded-full hover:bg-slate-200"><Icon name="x" size={16} /></button>
                            </div>
                            <h2 className="text-lg md:text-2xl font-bold text-slate-900 mb-2 leading-tight">{selectedProduct.name}</h2>
                            <p className="text-3xl md:text-4xl font-black text-brand-600 mb-6">{formatMoney(selectedProduct.price)}</p>

                            <Button onClick={() => { addToCart(selectedProduct); setSelectedProduct(null); }} className="w-full py-4 text-lg mb-6 shadow-brand-500/30">
                                <Icon name="shopping-cart" /> Adicionar
                            </Button>

                            {comparisons.length > 0 && (
                                <div className="border-t border-slate-100 pt-6 mt-auto">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase mb-3 tracking-wide">Preços em outras lojas</h3>
                                    <div className="space-y-2">
                                        {comparisons.map((c, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <Badge store={c.store} />
                                                <div className="flex items-center gap-3">
                                                    <span className="font-bold text-slate-700">{formatMoney(c.price)}</span>
                                                    <button onClick={() => { addToCart(c); setSelectedProduct(null); }} className="w-6 h-6 bg-white border border-slate-200 rounded flex items-center justify-center text-brand-600 hover:bg-brand-50"><Icon name="plus" size={14} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const MarketView = () => {
            const { products, categoryFilter, setCategoryFilter, storeFilter, setStoreFilter, addToCart, loading, setSelectedProduct, searchTerm, sortOption, setSortOption } = useContext(AppContext);
            const categories = useMemo(() => ["Todas", ...Array.from(new Set(products.map(p => p.category))).filter(Boolean).sort()], [products]);
            const stores = useMemo(() => ["Todas", ...Array.from(new Set(products.map(p => p.store))).filter(Boolean).sort()], [products]);

            const filtered = useMemo(() => {
                let res = products.filter(p => (categoryFilter === 'Todas' || p.category === categoryFilter) && (storeFilter === 'Todas' || p.store === storeFilter));

                if (searchTerm) {
                    const normalizedSearch = normalizeText(searchTerm);
                    const fuse = new Fuse(res, { keys: ['searchString', 'name'], threshold: 0.5, ignoreLocation: true });
                    res = fuse.search(normalizedSearch).map(r => r.item);
                }

                if (sortOption === 'price_asc') res.sort((a, b) => a.price - b.price); else if (sortOption === 'price_desc') res.sort((a, b) => b.price - a.price); else res.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                return res;
            }, [products, categoryFilter, storeFilter, searchTerm, sortOption]);

            if (loading) return <div className="text-center py-32 text-gray-400 flex flex-col items-center"><Icon name="loader" className="animate-spin mb-4" size={32} />A carregar catálogo...</div>;

            return (
                <div className="animate-fade-in space-y-4">
                    {/* Barra de Pesquisa e Ordenação */}
                    <div className="flex flex-col md:flex-row gap-3 relative z-20">
                        <div className="flex-1"><VisualAutocomplete placeholder="O que você precisa? (ex: luva, acido...)" onSelect={addToCart} /></div>
                        <div className="relative md:min-w-[180px]">
                            <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl appearance-none outline-none text-sm font-medium text-slate-700">
                                <option value="price_asc">Menor Preço</option>
                                <option value="price_desc">Maior Preço</option>
                                <option value="name_asc">Nome A-Z</option>
                            </select>
                            <span className="absolute right-3 top-3 text-slate-400 pointer-events-none"><Icon name="chevron-down" size={16} /></span>
                        </div>
                    </div>

                    {/* MENU DE CATEGORIAS MOBILE (Scroll Horizontal) */}
                    <div className="md:hidden pt-2">
                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 px-1">Filtro Inteligente</p>
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4">
                            {categories.map((cat, idx) => (
                                <button key={cat + idx} onClick={() => setCategoryFilter(cat)} className={cn("px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all border", categoryFilter === cat ? "bg-brand-600 text-white border-brand-600 shadow-md" : "bg-white text-slate-500 border-slate-200")}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Filtro de Lojas */}
                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4 md:mx-0 md:px-0">
                        {stores.map((st, idx) => (<button key={idx} onClick={() => setStoreFilter(st)} className={cn("px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold uppercase border transition whitespace-nowrap", storeFilter === st ? "bg-slate-800 text-white border-slate-800" : "bg-white text-slate-400 border-slate-200 hover:bg-slate-50")}>{st}</button>))}
                    </div>

                    {/* Grid de Produtos */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6 pt-2">
                        {filtered.map(p => (
                            <div key={p.uuid} onClick={() => setSelectedProduct(p)} className="bg-white border border-slate-100 rounded-2xl p-3 md:p-4 shadow-sm hover:shadow-xl transition cursor-pointer flex flex-col relative overflow-hidden group">
                                <div className="mb-3 flex justify-between items-start z-10">
                                    <Badge store={p.store} />
                                </div>
                                <div className="aspect-square bg-white rounded-xl mb-3 flex justify-center items-center p-2"><img src={p.img} className="max-w-full max-h-full object-contain mix-blend-multiply group-hover:scale-105 transition-transform duration-300" onError={(e) => e.target.src = "https://via.placeholder.com/150"} /></div>
                                <div className="flex-1 flex flex-col justify-end">
                                    <p className="text-[9px] font-black text-brand-600 uppercase mb-1 line-clamp-1">{p.category}</p>
                                    <h3 className="font-bold text-xs md:text-sm text-slate-700 leading-tight line-clamp-2 md:line-clamp-3 mb-2">{p.name}</h3>
                                    <div className="flex justify-between items-end mt-auto pt-2">
                                        <p className="font-black text-sm md:text-lg text-slate-900">{formatMoney(p.price)}</p>
                                        <button onClick={(e) => { e.stopPropagation(); addToCart(p); }} className="w-7 h-7 md:w-8 md:h-8 bg-brand-50 text-brand-600 rounded-lg flex justify-center items-center hover:bg-brand-600 hover:text-white transition active:scale-90"><Icon name="plus" size={16} /></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {filtered.length === 0 && (
                            <div className="col-span-full py-12 text-center text-slate-400">
                                <Icon name="search-x" size={48} className="mx-auto mb-4 opacity-20" />
                                <p>Nenhum produto encontrado para estes filtros.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const SmartListView = () => {
            const { products, addToCart, addToast } = useContext(AppContext);
            const [text, setText] = useState("");
            const [matches, setMatches] = useState([]);
            const [notFound, setNotFound] = useState([]);

            const handleProcess = () => {
                const lines = text.split('\n').filter(l => l.trim().length > 2);
                const fuse = new Fuse(products, { keys: ['searchString', 'name'], threshold: 0.5, ignoreLocation: true });
                const found = [];
                const missing = [];

                lines.forEach(l => {
                    const normalized = normalizeText(l);
                    const res = fuse.search(normalized);
                    if (res.length > 0) found.push(res[0].item);
                    else missing.push(l);
                });

                setMatches(found);
                setNotFound(missing);
                if (found.length) addToast(`${found.length} itens encontrados!`);
            };

            return (
                <div className="max-w-4xl mx-auto pt-4 md:pt-8 grid md:grid-cols-2 gap-6 md:gap-8 animate-slide-up">
                    <div className="bg-white p-5 md:p-6 rounded-3xl shadow-lg border border-slate-100">
                        <h2 className="text-lg md:text-xl font-bold mb-4 flex items-center gap-2"><Icon name="edit-3" /> A Minha Lista</h2>
                        <textarea value={text} onChange={e => setText(e.target.value)} className="w-full h-48 md:h-64 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm mb-4 focus:ring-2 focus:ring-brand-500 transition-all resize-none" placeholder="Cole aqui a sua lista de compras..."></textarea>

                        {notFound.length > 0 && <div className="mb-4 p-3 bg-red-50 border border-red-100 rounded-xl"><p className="text-xs font-bold text-red-600 mb-1">Não encontrados:</p><ul className="text-[10px] text-red-500 list-disc pl-4">{notFound.map((n, i) => <li key={i}>{n}</li>)}</ul></div>}

                        <Button onClick={handleProcess} className="w-full py-3" disabled={!text.trim()}>Procurar Produtos</Button>
                    </div>
                    <div className="bg-white p-5 md:p-6 rounded-3xl shadow-lg border border-slate-100 flex flex-col h-[400px] md:h-[600px]">
                        <h2 className="text-lg md:text-xl font-bold mb-4 flex items-center gap-2"><Icon name="check-circle" className="text-brand-500" /> Identificados ({matches.length})</h2>
                        <div className="flex-1 overflow-y-auto custom-scroll space-y-2 md:space-y-3 mb-4 pr-2">
                            {matches.map((m, i) => (
                                <div key={i} className="flex items-center gap-3 p-2.5 md:p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <img src={m.img} className="w-8 h-8 object-contain bg-white rounded p-0.5" onError={(e) => e.target.src = "https://via.placeholder.com/32"} />
                                    <div className="flex-1 min-w-0">
                                        <p className="text-[10px] md:text-xs font-bold text-slate-700 truncate">{m.name}</p>
                                        <div className="flex justify-between items-center mt-0.5">
                                            <p className="text-[9px] text-slate-400">{m.store}</p>
                                            <span className="text-[10px] font-black text-brand-600">{formatMoney(m.price)}</span>
                                        </div>
                                    </div>
                                    <button onClick={() => setMatches(p => p.filter((_, idx) => idx !== i))} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition"><Icon name="trash-2" size={14} /></button>
                                </div>
                            ))}
                            {matches.length === 0 && <div className="h-full flex items-center justify-center text-xs text-slate-400 text-center px-4">Faça a busca ao lado para ver a mágica acontecer.</div>}
                        </div>
                        <Button onClick={() => { matches.forEach(addToCart); setMatches([]); }} disabled={!matches.length} className="w-full py-3">Adicionar Tudo ao Carrinho</Button>
                    </div>
                </div>
            );
        };

        const CartView = () => {
            const { cart, removeFromCart, emptyCart, products, addToCart } = useContext(AppContext);
            const [expandedItems, setExpandedItems] = useState({});
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);

            if (!cart.length) return <div className="h-[60vh] flex flex-col items-center justify-center text-slate-400"><div className="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-4"><Icon name="shopping-bag" size={40} className="text-slate-300" /></div><p className="font-medium">O seu carrinho está vazio</p><p className="text-xs mt-1">Explore o catálogo para adicionar itens.</p></div>;

            const toggleExpand = (cartId) => {
                setExpandedItems(prev => ({ ...prev, [cartId]: !prev[cartId] }));
            };

            const getAlternatives = (category, currentItemId) => {
                return products
                    .filter(p => p.category === category && p.id !== currentItemId)
                    .sort((a, b) => a.price - b.price)
                    .slice(0, 10);
            };

            return (
                <div className="flex flex-col lg:flex-row gap-6 pb-6 animate-fade-in">
                    <div className="flex-1 space-y-4">
                        <div className="flex justify-between items-center mb-2 px-1">
                            <h2 className="text-lg md:text-xl font-bold flex items-center gap-2"><Icon name="shopping-cart" /> Os Seus Itens</h2>
                            <button onClick={emptyCart} className="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition active:scale-95">Limpar Tudo</button>
                        </div>
                        {cart.map(item => {
                            const isExpanded = expandedItems[item.cartId];
                            const alternatives = getAlternatives(item.category, item.id);

                            return (
                                <div key={item.cartId} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden transition-all">
                                    <div className="p-3 md:p-4 flex flex-col sm:flex-row sm:items-center gap-3 md:gap-4 relative">
                                        <div className="flex items-center gap-3 w-full sm:w-auto flex-1">
                                            <div className="w-14 h-14 md:w-16 md:h-16 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center shrink-0"><img src={item.img} className="h-full object-contain p-1" onError={(e) => e.target.src = "https://via.placeholder.com/50"} /></div>
                                            <div className="flex-1 min-w-0 pr-8 sm:pr-0">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <Badge store={item.store} />
                                                    <span className="text-[9px] md:text-[10px] text-slate-400 uppercase font-bold truncate">{item.category}</span>
                                                </div>
                                                <h4 className="font-bold text-xs md:text-sm text-slate-800 line-clamp-2">{item.name}</h4>
                                            </div>
                                        </div>
                                        <div className="flex items-center justify-between sm:justify-end w-full sm:w-auto sm:border-l sm:pl-4 sm:ml-2 gap-4">
                                            <p className="font-black text-brand-600 text-lg md:text-base">{formatMoney(item.price)}</p>
                                            <div className="flex items-center gap-2">
                                                {alternatives.length > 0 && (
                                                    <button onClick={() => toggleExpand(item.cartId)} className={cn("px-2 md:px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold flex items-center gap-1 transition", isExpanded ? "bg-slate-800 text-white" : "bg-brand-50 text-brand-700 hover:bg-brand-100")}>
                                                        {isExpanded ? <Icon name="chevron-up" size={14} /> : <Icon name="sparkles" size={14} />} {isExpanded ? 'Fechar' : 'Similares'}
                                                    </button>
                                                )}
                                                <button onClick={() => removeFromCart(item.cartId)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition sm:absolute sm:top-2 sm:right-2 lg:static"><Icon name="trash-2" size={16} /></button>
                                            </div>
                                        </div>
                                    </div>

                                    {isExpanded && alternatives.length > 0 && (
                                        <div className="bg-slate-50 border-t border-slate-100 p-3 md:p-4 animate-fade-in">
                                            <h5 className="text-[10px] md:text-xs font-bold text-brand-600 uppercase mb-3 flex items-center gap-1.5"><Icon name="search" size={12} /> Comparar com {item.category} de outras marcas/lojas</h5>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3">
                                                {alternatives.map(alt => (
                                                    <div key={alt.id} className="bg-white p-2 md:p-3 rounded-xl border border-slate-200 flex items-center gap-2 md:gap-3 hover:border-brand-300 transition shadow-sm">
                                                        <img src={alt.img} className="w-8 h-8 md:w-10 md:h-10 object-contain" onError={(e) => e.target.src = "https://via.placeholder.com/50"} />
                                                        <div className="flex-1 min-w-0">
                                                            <h6 className="text-[10px] md:text-xs font-bold text-slate-700 truncate">{alt.name}</h6>
                                                            <div className="flex justify-between items-center mt-1"><Badge store={alt.store} /><span className="text-xs md:text-sm font-black text-emerald-600">{formatMoney(alt.price)}</span></div>
                                                        </div>
                                                        <button onClick={() => addToCart(alt)} className="w-7 h-7 md:w-8 md:h-8 rounded-lg bg-emerald-50 text-emerald-600 border border-emerald-100 flex items-center justify-center hover:bg-emerald-600 hover:text-white transition active:scale-90"><Icon name="plus" size={16} /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="lg:w-80 shrink-0 relative">
                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-xl sticky top-24">
                            <h3 className="font-bold text-lg mb-6 pb-4 border-b border-slate-100 flex items-center gap-2"><Icon name="receipt" /> Resumo</h3>
                            <div className="space-y-3 mb-6 text-sm">
                                <div className="flex justify-between text-slate-500"><span>Itens no Carrinho</span><span className="font-bold text-slate-800">{cart.length}</span></div>
                                <div className="flex justify-between text-slate-500"><span>Frete</span><span className="font-bold text-emerald-500">A calcular</span></div>
                            </div>
                            <div className="flex justify-between mb-8 pt-4 border-t border-slate-100">
                                <span className="text-slate-500 font-bold">Total Estimado</span>
                                <span className="text-2xl md:text-3xl font-black text-brand-600">{formatMoney(total)}</span>
                            </div>
                            <Button className="w-full py-4 text-lg md:text-base font-black shadow-brand-500/30">Finalizar Pedido</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { activeTab, setActiveTab, cart, connected, products, categoryFilter, setCategoryFilter } = useContext(AppContext);
            const categories = useMemo(() => ["Todas", ...Array.from(new Set(products.map(p => p.category))).filter(Boolean).sort()], [products]);

            return (
                <div className="flex h-screen bg-slate-50 font-sans overflow-hidden">
                    <ProductDetailModal />

                    {/* Toast Notifications */}
                    <div className="fixed top-4 md:top-6 right-0 left-0 md:left-auto md:right-6 z-[110] flex flex-col gap-2 pointer-events-none px-4 md:px-0 items-center md:items-end">
                        {useContext(AppContext).toasts.map(t => (
                            <div key={t.id} className="pointer-events-auto bg-slate-900/90 backdrop-blur border border-slate-800 shadow-2xl rounded-2xl px-5 py-3 animate-slide-up flex items-center gap-3 md:min-w-[300px] w-auto max-w-sm">
                                <Icon name={t.type === 'error' ? 'alert-triangle' : 'check-circle-2'} className={t.type === 'error' ? 'text-red-400' : 'text-emerald-400'} size={18} />
                                <span className="text-xs font-bold text-white tracking-wide">{t.msg}</span>
                            </div>
                        ))}
                    </div>

                    {/* MENU LATERAL DESKTOP */}
                    <aside className="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex z-30 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
                        <div className="h-20 flex items-center px-6 border-b border-slate-100">
                            <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-500/30"><Icon name="hexagon" /></div>
                            <span className="ml-3 font-black text-xl tracking-tight text-slate-800">DentalPro</span>
                        </div>
                        <nav className="flex-1 py-6 px-4 space-y-1">
                            <button onClick={() => setActiveTab('market')} className={cn("w-full flex items-center px-4 py-3.5 rounded-xl transition font-bold text-sm", activeTab === 'market' ? "bg-brand-50 text-brand-700" : "text-slate-500 hover:bg-slate-50 hover:text-slate-900")}><Icon name="store" size={18} /><span className="ml-3">Catálogo</span></button>
                            <button onClick={() => setActiveTab('list')} className={cn("w-full flex items-center px-4 py-3.5 rounded-xl transition font-bold text-sm", activeTab === 'list' ? "bg-brand-50 text-brand-700" : "text-slate-500 hover:bg-slate-50 hover:text-slate-900")}><Icon name="list-plus" size={18} /><span className="ml-3">Importar Lista</span></button>
                            <button onClick={() => setActiveTab('cart')} className={cn("w-full flex items-center px-4 py-3.5 rounded-xl transition font-bold text-sm", activeTab === 'cart' ? "bg-brand-50 text-brand-700" : "text-slate-500 hover:bg-slate-50 hover:text-slate-900")}><Icon name="shopping-cart" size={18} /><span className="ml-3">Carrinho</span> {cart.length > 0 && <span className="ml-auto bg-brand-600 text-white text-[10px] font-black px-2 py-0.5 rounded-md">{cart.length}</span>}</button>

                            <div className="pt-8 pb-2 px-2 text-[10px] font-black uppercase text-slate-400 tracking-widest">Navegar por Categoria</div>
                            <div className="overflow-y-auto max-h-[40vh] custom-scroll space-y-0.5 pr-2">
                                {categories.map((cat, idx) => (
                                    <button key={cat + idx} onClick={() => { setCategoryFilter(cat); setActiveTab('market'); }} className={cn("w-full text-left px-3 py-2 rounded-lg text-xs font-semibold transition-all", categoryFilter === cat ? "bg-slate-800 text-white" : "text-slate-500 hover:bg-slate-100 hover:text-slate-900")}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </nav>
                        <div className="p-4 border-t border-slate-100 bg-slate-50/50">
                            <div className="flex items-center justify-between"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Servidor API</span><span className={`text-[9px] px-2 py-1 rounded-md font-black tracking-wide ${connected ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{connected ? 'ONLINE' : 'OFFLINE'}</span></div>
                        </div>
                    </aside>

                    {/* MENU INFERIOR MOBILE */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 flex justify-around items-center h-[72px] pb-safe px-2 shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
                        <button onClick={() => setActiveTab('market')} className={cn("flex flex-col items-center justify-center w-full h-full transition", activeTab === 'market' ? "text-brand-600" : "text-slate-400 hover:text-slate-600")}>
                            <Icon name="store" size={22} className={activeTab === 'market' ? "fill-brand-50" : ""} />
                            <span className="text-[10px] font-bold mt-1">Loja</span>
                        </button>
                        <button onClick={() => setActiveTab('list')} className={cn("flex flex-col items-center justify-center w-full h-full transition", activeTab === 'list' ? "text-brand-600" : "text-slate-400 hover:text-slate-600")}>
                            <Icon name="list-plus" size={22} />
                            <span className="text-[10px] font-bold mt-1">Lista Rápida</span>
                        </button>
                        <button onClick={() => setActiveTab('cart')} className={cn("flex flex-col items-center justify-center w-full h-full relative transition", activeTab === 'cart' ? "text-brand-600" : "text-slate-400 hover:text-slate-600")}>
                            <div className="relative">
                                <Icon name="shopping-cart" size={22} className={activeTab === 'cart' ? "fill-brand-50" : ""} />
                                {cart.length > 0 && <span className="absolute -top-1.5 -right-2 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-md border-2 border-white shadow-sm">{cart.length}</span>}
                            </div>
                            <span className="text-[10px] font-bold mt-1">Carrinho</span>
                        </button>
                    </nav>

                    {/* CONTEÚDO PRINCIPAL */}
                    <main className="flex-1 flex flex-col min-w-0 relative">
                        <header className="h-16 md:h-20 bg-white/90 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-4 md:px-8 sticky top-0 z-40">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white shadow-md md:hidden"><Icon name="hexagon" size={16} /></div>
                                <h1 className="text-lg md:text-2xl font-black text-slate-800 tracking-tight">{activeTab === 'market' ? 'Catálogo' : activeTab === 'list' ? 'Busca Rápida' : 'Carrinho'}</h1>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest">Total</p>
                                    <p className="font-black text-slate-900 text-base md:text-lg tabular-nums leading-none mt-0.5">{formatMoney(cart.reduce((a, b) => a + (b.price * (b.qty || 1)), 0))}</p>
                                </div>
                            </div>
                        </header>

                        {/* Area de scroll principal (pb-24 para mobile por causa do menu inferior, pb-8 para desktop) */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll pb-28 md:pb-8">
                            <div className="max-w-7xl mx-auto">
                                {activeTab === 'market' && <MarketView />}
                                {activeTab === 'list' && <SmartListView />}
                                {activeTab === 'cart' && <CartView />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><AppProvider><App /></AppProvider></ErrorBoundary>);
    </script>
</body>

</html>
